<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>brainctl — Knowledge Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Bar -->
  <header id="topbar">
    <div class="topbar-left">
      <div class="logo">🧠 <span>brainctl</span></div>
      <div class="view-switcher">
        <button class="view-btn active" data-view="explorer">Explorer</button>
        <button class="view-btn" data-view="neural">Neural Map</button>
      </div>
    </div>
    <div class="topbar-center">
      <div class="global-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="globalSearch" placeholder="Search memories, entities, events…" autocomplete="off">
      </div>
    </div>
    <div class="topbar-right">
      <div class="stats-pills" id="statsPills"></div>
    </div>
  </header>

  <!-- Explorer View -->
  <div id="explorerView" class="view active">
    <aside id="sidebar">
      <nav>
        <a class="nav-item active" data-section="memories">
          <span class="nav-icon">💭</span>Memories
        </a>
        <a class="nav-item" data-section="entities">
          <span class="nav-icon">🔮</span>Entities
        </a>
        <a class="nav-item" data-section="events">
          <span class="nav-icon">⚡</span>Events
        </a>
        <a class="nav-item" data-section="decisions">
          <span class="nav-icon">🎯</span>Decisions
        </a>
        <a class="nav-item" data-section="triggers">
          <span class="nav-icon">🔔</span>Triggers
        </a>
        <a class="nav-item" data-section="health">
          <span class="nav-icon">📊</span>Health
        </a>
      </nav>
    </aside>
    <main id="content">
      <div id="contentArea"></div>
    </main>
  </div>

  <!-- Neural Map View -->
  <div id="neuralView" class="view">
    <canvas id="neuralCanvas"></canvas>
    <div id="neuralFilterBar">
      <div class="neural-filter-group">
        <button class="neural-filter-btn active" data-filter="overview">Structure</button>
        <button class="neural-filter-btn" data-filter="thinking">Activity</button>
        <button class="neural-filter-btn" data-filter="all">Full Brain</button>
      </div>
      <label class="neural-toggle">
        <input type="checkbox" id="neuralEventsToggle" checked>
        <span>Thoughts</span>
      </label>
      <label class="neural-toggle">
        <input type="checkbox" id="neuralDecisionsToggle" checked>
        <span>Decisions</span>
      </label>
      <label class="neural-toggle">
        <input type="checkbox" id="neuralMemoriesToggle" checked>
        <span>Memories</span>
      </label>
    </div>
    <div id="neuralControls">
      <button id="neuralZoomIn" title="Zoom In">+</button>
      <button id="neuralZoomOut" title="Zoom Out">−</button>
      <button id="neuralReset" title="Reset">⟲</button>
    </div>
    <div id="neuralLegend" style="position:absolute;top:56px;right:12px;background:rgba(5,10,20,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;font:11px system-ui;color:#999;z-index:50;pointer-events:none;">
      <div style="font-weight:600;color:#ccc;margin-bottom:6px;">Node Types</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#5c6bc0"></span> Agent</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4fc3f7"></span> Person / Org</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#81c784"></span> Project</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ffb74d"></span> Tool</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ce93d8"></span> Concept</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4dd0e1"></span> Event</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ffd54f"></span> Decision</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#66bb6a"></span> Memory</div>
      <div style="font-weight:600;color:#ccc;margin:8px 0 4px;">Edges</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:16px;height:2px;background:#7c4dff"></span> Agent → Content</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:16px;height:2px;background:#4fc3f7"></span> Entity Relation</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:16px;height:2px;background:#ffd54f"></span> Decision Link</div>
      <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><span style="display:inline-block;width:16px;height:2px;background:#66bb6a"></span> Memory Link</div>
    </div>
    <div id="neuralTooltip" class="neural-tooltip hidden"></div>
    <div id="neuralDetail" class="neural-detail hidden"></div>
  </div>

  <script src="app.js"></script>
  <script src="neural.js"></script>
</body>
</html>
