# LongMemEval strict-gate budget.
#
# Applied by `tests/bench/run.py --bench longmemeval --check-strict`.
# See `tests/bench/gate.py:DEFAULT_BUDGET` for the hardcoded fallback
# that this file overrides field-by-field.
#
# Tolerances are absolute deltas on [0, 1] metrics — i.e. 0.002 == 0.2pp.
# A regression deeper than the tolerance fails the gate. Plan envelope:
#   +0.8pp Hit@1 target, Hit@10 delta >= -0.2pp, p95 <= current + 15%.
#
# The baseline_p95_ms is a separate axis from the retrieval metrics
# in baselines/longmemeval.json — I1 owns those, I8 owns this.

overall:
  tolerances:
    hit_at_1:    0.002   # -0.2pp
    hit_at_5:    0.002
    hit_at_10:   0.002   # new gate (PH5)
    mrr:         0.002
    ndcg_at_5:   0.002
    recall_at_5: 0.002

slices:
  # LongMemEval's axis is `question_type`. We read from baseline's
  # by_category cell for each type and apply these tolerances.
  tolerances:
    hit_at_1:    0.010   # -1.0pp; small buckets (~30-140 entries each) wiggle
    mrr:         0.010
    ndcg_at_5:   0.010
  # Slices with < min_count questions are informational only. 30 matches
  # the LongMemEval retrieval-friendly axis floor (single-session-preference
  # has 30 questions in the committed baseline).
  min_count: 30

latency:
  # End-to-end p95 per-query latency ceiling. Computed in the runner from
  # per-question wall-clock timing; compared against baseline_p95_ms with
  # ratio <= p95_multiplier.
  p95_multiplier: 1.15
  # Set this the first time you intentionally want to gate latency.
  # Leaving it unset keeps the latency check in "informational only" mode
  # so a missing baseline does not red-flag CI.
  baseline_p95_ms: null
  min_baseline_ms: 50.0
