name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to read-only. Individual jobs that need more (e.g. the
# retrieval-gate job posting a PR comment) declare per-job
# `permissions:` overrides that still apply on top of this default.
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Tier 1: unit + integration. Runs on every PR + every push to main.
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'
          pip install pytest
      - name: Run tests
        run: pytest tests/ -v

  # --------------------------------------------------------------------------
  # Docs sync: scripts/check_docs.py asserts that the published doc counts
  # (MCP tool count, command count, etc.) match the implementation.
  # --------------------------------------------------------------------------
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install brainctl
        run: pip install -e ".[mcp]"
      - name: Check docs match implementation
        run: python3 scripts/check_docs.py

  # --------------------------------------------------------------------------
  # Tier 2: latency regression. Runs on every PR — fast (~10s) and cheap.
  # Gated by BRAINCTL_RUN_BENCH=1 so the test body only enforces thresholds
  # in CI. Baseline lives at tests/bench/baselines/latency.json; p95 on the
  # nine hot-path operations must land at or under the committed values.
  # --------------------------------------------------------------------------
  # Tier 2.5: raw-op latency regression gate.
  #
  # Library-level ops (brain_search_*, brain_remember_*, vec_*) DO gate
  # cross-platform — the +50% ratio threshold holds up because sqlite3
  # + FTS5 are deterministic enough to compare macOS baseline vs
  # ubuntu-latest fresh.
  #
  # CLI-subprocess ops (cli_search_*, cli_remember_*, cli_stats) are
  # automatically excluded when baseline.platform != fresh.platform,
  # because per-op cost is dominated by Python interpreter cold-start
  # + import graph, which differs 50-100% between platforms. The skip
  # is implemented in tests/test_latency_regression.py —
  # see SUBPROCESS_BOUND_OPS + the cross_platform branch.
  latency-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install brainctl
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'
          pip install pytest
      - name: Latency regression gate
        env:
          BRAINCTL_RUN_BENCH: "1"
        run: pytest tests/test_latency_regression.py -v

  # --------------------------------------------------------------------------
  # Tier 3: synthetic retrieval-quality gate. Fast enough to run on every PR
  # (~1s on the committed 30-memory fixture). LOCOMO + LongMemEval are NOT
  # here — those take minutes and need Ollama, which stock GitHub runners
  # do not have. Those tiers should run on a nightly workflow against a
  # runner with Ollama pre-installed.
  # --------------------------------------------------------------------------
  retrieval-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install brainctl
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'
          pip install pytest
      - name: Synthetic search-quality gate
        env:
          BRAINCTL_RUN_BENCH: "1"
        run: |
          python3 -m tests.bench.run --check

  # --------------------------------------------------------------------------
  # Tier 4: PH5 retrieval regression gate — the "top-heavy" plan envelope.
  # Runs `--check-strict` against LongMemEval + LoCoMo so a PR that drops
  # hit_at_1 by more than 0.2pp, breaks a per-slice axis, or blows a 15%
  # p95-latency budget fails CI.
  #
  # Only runs on PRs that touch retrieval code paths or the bench harness
  # itself — full LongMemEval takes minutes and we don't want every docs
  # PR paying that tax. The path filter must stay aligned with the files
  # listed in the PR template under "Gate-triggering paths".
  #
  # LongMemEval dataset (~277 MB) is cached with actions/cache@v4 keyed on
  # the upstream URL hash (which is stable per release). CI backend is
  # `brain` (FTS5-only) because stock GitHub runners have no Ollama; the
  # hybrid `cmd` backend is the job for a self-hosted Ollama runner.
  # --------------------------------------------------------------------------
  retrieval-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # pull-requests: write is needed by the trailing "Post bench summary
    # as PR comment" step (actions/github-script). Without it the step
    # 403s on issues.createComment and fails the job even when the bench
    # itself passed.
    permissions:
      contents: read
      pull-requests: write
    # Path filter: only pay the minutes-long LongMemEval tax when we're
    # touching retrieval. The planning doc calls these the "top-heavy
    # retrieval" hot paths — keep in sync with the plan.
    # NOTE: the top-level `on:` block doesn't support per-job paths,
    # so we use dorny/paths-filter in the first step as the gate.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        with:
          filters: |
            retrieval:
              - 'src/agentmemory/search.py'
              - 'src/agentmemory/rerank.py'
              - 'src/agentmemory/embeddings.py'
              - 'src/agentmemory/retrieval.py'
              - 'bin/intent_classifier.py'
              - 'tests/bench/**'

      - name: Set up Python
        if: steps.changes.outputs.retrieval == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install brainctl (with bench extras)
        if: steps.changes.outputs.retrieval == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all,bench]'
          pip install pytest

      # Dataset cache: LongMemEval _s split is ~277 MB and lives at
      # tests/bench/datasets/longmemeval/longmemeval_s_cleaned.json. The
      # upstream URL is stable per release so we key on its SHA256. The
      # loader's download helper is idempotent — restoring the cache means
      # load() sees the file and skips the network entirely.
      - name: Compute LongMemEval dataset cache key
        if: steps.changes.outputs.retrieval == 'true'
        id: lme_key
        env:
          LME_URL: "https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned/resolve/main/longmemeval_s_cleaned.json"
        run: |
          echo "key=longmemeval-s-$(printf '%s' "$LME_URL" | shasum -a 256 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Restore LongMemEval dataset cache
        if: steps.changes.outputs.retrieval == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: tests/bench/datasets/longmemeval
          key: ${{ steps.lme_key.outputs.key }}

      - name: Prepare report directory
        if: steps.changes.outputs.retrieval == 'true'
        run: mkdir -p bench-reports

      - name: LongMemEval strict gate
        if: steps.changes.outputs.retrieval == 'true'
        env:
          BRAINCTL_RUN_BENCH: "1"
        run: |
          python3 -m tests.bench.run \
            --bench longmemeval \
            --check-strict \
            --report-json "bench-reports/longmemeval.json"

      - name: LoCoMo strict gate
        if: steps.changes.outputs.retrieval == 'true'
        env:
          BRAINCTL_RUN_BENCH: "1"
        run: |
          python3 -m tests.bench.run \
            --bench locomo \
            --check-strict \
            --report-json "bench-reports/locomo.json"

      - name: Upload bench report artefacts
        if: steps.changes.outputs.retrieval == 'true' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: bench-reports
          path: bench-reports/

      - name: Post bench summary as PR comment
        if: steps.changes.outputs.retrieval == 'true' && always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'bench-reports';
            if (!fs.existsSync(dir)) return;
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
            if (files.length === 0) return;
            let body = '### Retrieval gate — bench matrix\n\n';
            for (const f of files) {
              const data = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
              const pass = data.pass ? ':white_check_mark: pass' : ':x: fail';
              body += `#### ${data.bench} — ${pass}\n\n`;
              body += `- backend: \`${data.backend}\`\n`;
              body += `- n_questions: ${data.n_questions}\n`;
              body += `- elapsed_s: ${data.elapsed_s}\n`;
              if (data.strict && data.strict.latency) {
                const lat = data.strict.latency;
                body += `- p95_latency_ms: ${lat.current_p95_ms} (baseline ${lat.baseline_p95_ms}, ratio ${lat.ratio}, ${lat.pass ? 'pass' : 'FAIL'})\n`;
              }
              if (data.strict && data.strict.failing && data.strict.failing.length) {
                body += `\n**Failing checks:**\n`;
                for (const f of data.strict.failing.slice(0, 10)) {
                  body += `- ${JSON.stringify(f)}\n`;
                }
              }
              body += '\n';
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
