name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Protected environment — requires a manual approval gate before the
    # OIDC-based PyPI publish runs. Configure in repo Settings →
    # Environments → `pypi` with at least one required reviewer, and
    # re-bind the PyPI trusted-publisher binding (pypi.org/manage/account/
    # publishing/) so the trusted publisher for this repo is scoped to
    # environment `pypi`.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
